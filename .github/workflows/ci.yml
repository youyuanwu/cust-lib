name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install cust
        run: just install-cust

      - name: Build
        run: just build

      - name: Run tests
        run: just test
